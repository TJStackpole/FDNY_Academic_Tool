<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FDNY Promotion Exam Prep — Study Console</title>
<meta name="description" content="Adaptive study tool for FDNY Lieutenant, Captain, Battalion Chief, and Deputy Chief promotion exams: personalized dashboard, learner profiling, adaptive study plans, flashcards, practice tests, daily quizzes, decision scenarios, an AI study assistant, a podcast studio, diagrams, and a reference library." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0B0E13; --bg-elev:#12171F; --bg-elev-2:#1A212C; --bg-elev-3:#232C3A;
  --line:#222B39; --line-strong:#33404F;
  --text:#E7ECF3; --text-dim:#93A0B4; --text-faint:#5D6B7E;
  --red:#E4272E; --red-dk:#A2141B; --amber:#F5A623; --green:#35C46B; --cyan:#2FC6D4; --violet:#8B7BF0; --gold:#E9C46A;
  --radius:10px; --radius-sm:6px;
  --font-display:'Oswald','Arial Narrow',system-ui,sans-serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:radial-gradient(1200px 600px at 82% -12%,rgba(228,39,46,.07),transparent 60%),var(--bg);
  color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.55}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}
a{color:var(--cyan)}
button{font:inherit}
.eyebrow{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.18em;font-weight:600;font-size:11px;color:var(--text-faint)}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.signage{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

.app{display:grid;grid-template-columns:250px 1fr;grid-template-rows:auto 1fr;
  grid-template-areas:"topbar topbar" "nav main";height:100vh}

/* Topbar */
.topbar{grid-area:topbar;display:flex;align-items:center;gap:16px;padding:11px 20px;
  background:linear-gradient(180deg,#10151d,#0c1017);border-bottom:1px solid var(--line)}
.topbar__emblem{width:42px;height:42px;flex:none}
.topbar__titles h1{margin:0;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;font-size:18px;font-weight:700}
.topbar__titles h1 span{color:var(--red)}
.topbar__sub{font-size:11px;color:var(--text-dim)}
.topbar__right{margin-left:auto;display:flex;align-items:center;gap:14px}
.rank-select{display:flex;background:var(--bg-elev);border:1px solid var(--line-strong);border-radius:999px;padding:3px}
.rank-select button{background:transparent;border:none;color:var(--text-dim);padding:6px 13px;border-radius:999px;cursor:pointer;
  font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;font-size:12px;font-weight:600}
.rank-select button.on{background:var(--red);color:#fff}
.streak{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);background:var(--bg-elev);
  border:1px solid var(--line-strong);border-radius:999px;padding:6px 12px}
.streak b{font-family:var(--font-mono);color:var(--amber);font-size:14px}
.iconbtn{background:var(--bg-elev);border:1px solid var(--line-strong);color:var(--text-dim);width:36px;height:36px;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.iconbtn:hover{border-color:var(--red);color:var(--text)}
.iconbtn svg{width:18px;height:18px}

/* Nav */
.nav{grid-area:nav;background:var(--bg-elev);border-right:1px solid var(--line);overflow-y:auto;padding:10px 8px}
.nav__group{margin:6px 6px 12px}
.nav__label{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-faint);padding:8px 8px 4px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--radius-sm);color:var(--text-dim);
  text-decoration:none;font-size:13.5px;font-weight:500;border:1px solid transparent;margin-bottom:2px}
.nav a:hover{background:var(--bg-elev-2);color:var(--text)}
.nav a.on{background:var(--bg-elev-2);color:var(--text);border-color:var(--red)}
.nav a svg{width:18px;height:18px;flex:none;color:inherit}
.nav a .badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--amber);background:rgba(245,166,35,.12);padding:1px 6px;border-radius:5px}
.nav a .dot-ai{margin-left:auto;font-size:9px;color:var(--violet);background:rgba(139,123,240,.14);padding:1px 6px;border-radius:5px;font-family:var(--font-mono)}

/* Main */
.main{grid-area:main;overflow-y:auto;padding:24px 30px 70px}
.view{max-width:1080px}
.page-head{margin-bottom:6px}
.page-head h2{margin:0;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-size:26px;font-weight:700}
.page-head p{margin:4px 0 0;color:var(--text-dim);max-width:74ch}

.section{margin-top:26px}
.section__title{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.section__title h3{margin:0;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.08em;font-size:15px;font-weight:600}
.section__title .rule{flex:1;height:1px;background:var(--line)}
.section__title .tag{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}

.panel{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}

.tile{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;
  text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:8px;transition:border-color .12s,transform .12s}
.tile:hover{border-color:var(--red);transform:translateY(-2px)}
.tile .ico{width:34px;height:34px;color:var(--red)}
.tile h4{margin:0;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-size:15px}
.tile p{margin:0;font-size:12px;color:var(--text-dim);line-height:1.5}

.stat{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--line-strong))}
.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.stat .val{font-family:var(--font-mono);font-weight:700;font-size:28px;line-height:1}
.stat .val .u{font-size:12px;color:var(--text-dim);margin-left:3px}
.stat .foot{margin-top:7px;font-size:11px;color:var(--text-dim)}

.btn{display:inline-flex;align-items:center;gap:8px;background:var(--bg-elev-2);border:1px solid var(--line-strong);
  color:var(--text);padding:9px 15px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500}
.btn:hover{border-color:var(--red)}
.btn--red{background:var(--red);border-color:var(--red);color:#fff}
.btn--red:hover{background:var(--red-dk)}
.btn--violet{background:var(--violet);border-color:var(--violet);color:#fff}
.btn--ghost{background:transparent}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.pill{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.03em;white-space:nowrap}
.pill--green{background:rgba(53,196,107,.14);color:var(--green)} .pill--amber{background:rgba(245,166,35,.14);color:var(--amber)}
.pill--red{background:rgba(228,39,46,.16);color:#ff6b70} .pill--cyan{background:rgba(47,198,212,.14);color:var(--cyan)}
.pill--dim{background:var(--bg-elev-2);color:var(--text-dim)} .pill--violet{background:rgba(139,123,240,.16);color:var(--violet)}

label.fld{display:block;margin-bottom:14px}
label.fld .k{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:6px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line-strong);color:var(--text);
  border-radius:var(--radius-sm);padding:9px 11px;font:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--cyan);outline-offset:1px;border-color:var(--cyan)}
input[type=range]{padding:0}
textarea{resize:vertical;min-height:90px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--bg-elev-2);border:1px solid var(--line-strong);color:var(--text-dim);border-radius:999px;
  padding:6px 13px;cursor:pointer;font-size:12.5px;user-select:none}
.chip.on{background:rgba(228,39,46,.15);border-color:var(--red);color:#ff9ea1}

.notice{display:flex;gap:11px;align-items:flex-start;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);
  border-radius:var(--radius);padding:12px 15px;margin-bottom:18px;font-size:12.5px;color:var(--text-dim)}
.notice b{color:var(--amber)}
.notice a{color:var(--amber)}
.notice code{font-family:var(--font-mono);font-size:11px;background:var(--bg-elev-2);padding:1px 5px;border-radius:4px}
.notice--ai{background:rgba(139,123,240,.08);border-color:rgba(139,123,240,.3)}
.notice--ai b{color:var(--violet)}.notice--ai a{color:var(--violet)}

/* Ring */
.ring-wrap{display:flex;align-items:center;gap:22px}
.ring-meta .row{display:flex;justify-content:space-between;gap:22px;font-size:12px;margin-bottom:8px}
.ring-meta .row .k{color:var(--text-dim)} .ring-meta .row .v{font-family:var(--font-mono);font-weight:600}

/* Flashcard */
.fcard{perspective:1200px;height:240px}
.fcard__inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.fcard.flip .fcard__inner{transform:rotateY(180deg)}
.fcard__face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line-strong);border-radius:var(--radius);
  padding:26px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--bg-elev)}
.fcard__face .tp{position:absolute;top:14px;left:16px}
.fcard__face .hint{position:absolute;bottom:12px;font-size:11px;color:var(--text-faint)}
.fcard__front{font-size:19px;font-weight:600}
.fcard__back{transform:rotateY(180deg);background:var(--bg-elev-2);font-size:15px;color:var(--text-dim);line-height:1.6}

/* Quiz */
.qwrap{max-width:760px}
.qcard{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
.qcard .qtext{font-size:16px;font-weight:600;margin:6px 0 16px}
.choice{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line-strong);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:border-color .1s,background .1s}
.choice:hover{border-color:var(--cyan)}
.choice .mk{font-family:var(--font-mono);font-weight:700;color:var(--text-faint)}
.choice.sel{border-color:var(--cyan);background:rgba(47,198,212,.06)}
.choice.correct{border-color:var(--green);background:rgba(53,196,107,.09)}
.choice.wrong{border-color:var(--red);background:rgba(228,39,46,.09)}
.explain{margin-top:10px;padding:12px 14px;background:var(--bg-elev-2);border-left:3px solid var(--cyan);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:13px;color:var(--text-dim)}
.progressbar{height:6px;background:var(--bg-elev-2);border-radius:4px;overflow:hidden;margin:6px 0 18px}
.progressbar>i{display:block;height:100%;background:var(--red);border-radius:4px;transition:width .3s}

/* Reference table */
.ref{display:flex;align-items:center;gap:14px;padding:13px 15px;border-bottom:1px solid var(--line)}
.ref:last-child{border-bottom:none}
.ref .ico{width:22px;height:22px;color:var(--gold);flex:none}
.ref .meta{flex:1}
.ref .meta .t{font-weight:600}
.ref .meta .d{font-size:12px;color:var(--text-dim)}

/* Podcast */
.pod-script{background:var(--bg);border:1px solid var(--line-strong);border-radius:var(--radius);padding:16px 18px;max-height:360px;overflow:auto;line-height:1.7}
.pod-script p{margin:0 0 12px;transition:color .2s}
.pod-script p.now{color:var(--cyan)}
.pod-script p.seg-head{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;color:var(--amber);font-size:13px}
.pod-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0}

/* Acronyms */
.acr{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px}
.acr h4{margin:0 0 4px;font-family:var(--font-display);letter-spacing:.06em;font-size:20px;color:var(--red)}
.acr .exp{display:flex;flex-wrap:wrap;gap:6px 14px;margin:10px 0}
.acr .exp span{font-size:13px}.acr .exp b{color:var(--amber);font-family:var(--font-mono)}
.acr .use{font-size:12px;color:var(--text-dim)}
.acr .owner{margin-top:8px;display:flex;gap:8px;align-items:center}

/* Survey */
.survey-q{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
.survey-q .q{font-weight:600;margin-bottom:12px}
.survey-opt{display:block;border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:8px;cursor:pointer;font-size:13.5px}
.survey-opt.sel{border-color:var(--red);background:rgba(228,39,46,.07)}

/* Plan */
.avail{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:6px}
.avail .day{background:var(--bg);border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:8px;text-align:center}
.avail .day .dn{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:6px}
.avail .day input{padding:5px;text-align:center;font-family:var(--font-mono)}
.session{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--bg-elev)}
.session .dot{width:9px;height:9px;border-radius:50%;flex:none}
.session .when{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);min-width:130px}
.session .what{flex:1;font-weight:500}
.session .mod{font-size:11px}

.diagram-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px}
.diagram-card h4{margin:0 0 4px;font-family:var(--font-display);letter-spacing:.04em;font-size:16px}
.diagram-card .cap{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.video-slot{aspect-ratio:16/9;background:var(--bg);border:1px dashed var(--line-strong);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-faint);text-align:center;padding:16px}

.empty{color:var(--text-dim);text-align:center;padding:40px 20px}
.heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.heat__tile{background:var(--bg-elev-2);border:1px solid var(--line-strong);border-left:3px solid var(--c);border-radius:var(--radius-sm);
  padding:11px 12px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:2px;color:inherit;font:inherit;transition:border-color .12s,transform .12s}
.heat__tile:hover{transform:translateY(-2px);border-color:var(--c)}
.heat__tile .ht-acc{font-family:var(--font-mono);font-weight:700;font-size:19px;line-height:1}
.heat__tile .ht-lbl{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-size:12px;color:var(--text)}
.heat__tile .ht-n{font-family:var(--font-mono);font-size:10px;color:var(--text-faint)}
.heat-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.heat-legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.heat-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.adh{display:flex;gap:4px;flex-wrap:wrap;margin:14px 0 4px}
.adh__d{width:16px;height:16px;border-radius:4px;background:#232C3A;border:1px solid var(--line-strong)}
.adh__d.ok{background:var(--green);border-color:var(--green)}
.adh__d.miss{background:var(--red);border-color:var(--red)}
.adh__d.off{background:#232C3A;border-color:var(--line)}
.focus{display:flex;align-items:center;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line)}
.focus:last-child{border-bottom:none}
.focus__acc{font-family:var(--font-mono);font-weight:700;font-size:20px;min-width:52px}
.focus__meta{flex:1}
.focus__t{font-weight:600}
.focus__n{font-size:12px;color:var(--text-faint);font-family:var(--font-mono)}

/* AI Assistant chat */
.chat{display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:420px}
.chat__log{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:11px;max-width:88%}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg__av{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px}
.msg.me .msg__av{background:var(--red);color:#fff}
.msg.ai .msg__av{background:var(--violet);color:#fff}
.msg__body{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);padding:11px 14px;font-size:13.5px;line-height:1.6;white-space:pre-wrap}
.msg.me .msg__body{background:var(--bg-elev-2);border-color:var(--line-strong)}
.msg__body .src{margin-top:8px;font-size:11px;color:var(--text-faint);border-top:1px dashed var(--line-strong);padding-top:7px}
.chat__form{display:flex;gap:10px;margin-top:14px;align-items:flex-end}
.chat__form textarea{min-height:46px;max-height:150px}
.typing{display:inline-flex;gap:4px}.typing i{width:6px;height:6px;border-radius:50%;background:var(--violet);animation:tp 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,60%,100%{opacity:.3}30%{opacity:1}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,7,10,.72);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--bg-elev);border:1px solid var(--line-strong);border-radius:var(--radius);max-width:520px;width:100%;padding:22px 24px;max-height:88vh;overflow:auto}
.modal h3{margin:0 0 4px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.04em}
.modal .close{float:right;cursor:pointer;color:var(--text-faint);background:none;border:none;font-size:20px}

@media (max-width:960px){
  .app{grid-template-columns:1fr;grid-template-areas:"topbar" "nav" "main";grid-template-rows:auto auto 1fr;height:auto}
  .nav{display:grid;grid-template-columns:repeat(2,1fr);max-height:none}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .topbar__right{flex-wrap:wrap}
  .chat{height:auto;min-height:360px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <!-- PLACEHOLDER EMBLEM. The FDNY Maltese cross is a City of New York trademark.
         Replace this inline <svg> with your own authorized artwork before public use. -->
    <svg class="topbar__emblem" viewBox="0 0 240 240" aria-label="emblem placeholder">
      <defs><linearGradient id="st" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3D27A"/><stop offset="1" stop-color="#C9992F"/></linearGradient>
      <radialGradient id="cr" cx=".5" cy=".4" r=".75"><stop offset="0" stop-color="#E4272E"/><stop offset="1" stop-color="#A2141B"/></radialGradient></defs>

/* ---------- readiness / progress ---------- */
function progress(){return Store.get('progress',{answered:0,correct:0,byTopic:{},quizDays:[],known:{}});}
function saveProgress(p){Store.set('progress',p);}
function readiness(){
  const p=progress();
  const acc=p.answered?p.correct/p.answered:0;
  const coverage=Math.min(1,Object.keys(p.byTopic).length/TOPICS.length);
  const volume=Math.min(1,p.answered/120);
  return Math.max(0,Math.min(1,acc*0.5+coverage*0.25+volume*0.25));
}
function streak(){
  const days=(progress().quizDays||[]).slice().sort();
  if(!days.length)return 0;let s=0;let d=new Date();
  for(;;){const k=d.toISOString().slice(0,10);if(days.includes(k)){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
function recordAnswer(topic,correct){
  const p=progress();p.answered++;if(correct)p.correct++;
  p.byTopic[topic]=p.byTopic[topic]||{a:0,c:0};p.byTopic[topic].a++;if(correct)p.byTopic[topic].c++;
  p.daily=p.daily||{};const k=todayKey();p.daily[k]=(p.daily[k]||0)+1;
  saveProgress(p);snapshotToday();
}
function markQuizDay(){const p=progress();const k=todayKey();p.quizDays=p.quizDays||[];if(!p.quizDays.includes(k))p.quizDays.push(k);saveProgress(p);}

/* ---------- analytics: history, activity, adherence ---------- */
function snapshotToday(){
  const p=progress();p.history=p.history||[];const k=todayKey();const r=readiness();
  const e=p.history.find(x=>x.d===k);
  if(e){e.r=r;e.a=p.answered;e.c=p.correct;}else{p.history.push({d:k,r,a:p.answered,c:p.correct});}
  if(p.history.length>60)p.history=p.history.slice(-60);

  for(let i=days-1;i>=0;i--){const d=new Date(base);d.setDate(base.getDate()-i);const k=d.toISOString().slice(0,10);out.push({d:k,v:daily[k]||0});}

function planAdherence(){
  const plan=Store.get('plan',null);if(!plan)return null;
  const start=plan.created?new Date(plan.created+'T00:00:00'):new Date();start.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  const done=sessionDoneMap();const daily=progress().daily||{};
  let total=0,met=0;const strip=[];
  for(let d=new Date(start);d<=today;d.setDate(d.getDate()+1)){
    const dn=IXDAY[d.getDay()];const mins=(plan.avail&&plan.avail[dn])||0;const k=d.toISOString().slice(0,10);
    if(mins>0){total++;const ok=!!done[k]||(daily[k]>0);if(ok)met++;strip.push({d:k,scheduled:true,ok});}
    else strip.push({d:k,scheduled:false,ok:false});
  }
  return {total,met,pct:total?met/total:0,strip:strip.slice(-21)};
}

/* ============================================================
   AI LAYER — Study Assistant + podcast scripting
   ------------------------------------------------------------
   callClaude() works two ways:
   1) Inside the Claude.ai artifact preview, fetch to the API
      succeeds with no key (the environment injects credentials).
   2) When self-hosted (GitHub Pages, etc.), it uses an Anthropic
      API key you save in Settings (localStorage only). Without a
      key in that context, it returns a friendly setup message.
   The user's own reference/manifest text is passed as context so
   answers are grounded in THEIR material, not the model's guesses.
   ============================================================ */
function aiKey(){return Store.get('aiKey','');}
function aiModel(){return Store.get('aiModel','claude-sonnet-4-6');}
function ragUrl(){return Store.get('ragUrl','').trim();}
function appToken(){return Store.get('appToken','');}
function ragOn(){return !!ragUrl();}
/* Routes AI calls: if a backend (Supabase RAG) is configured it retrieves passages
   from the ingested manuals and generates there (Anthropic key stays server-side);
   otherwise it calls Anthropic directly (works in the preview / with a saved key). */
/* ---------- Bundled manual (prototype): in-browser retrieval, no backend ----------
   Loads content/lt-knowledge.json lazily on first AI use, then scores chunks by
   term frequency × inverse document frequency so only the relevant passages are
   sent to the model. Currently the Lieutenant manual is bundled. */
let KB; // undefined = not tried, null = unavailable, object = loaded
const STOP=new Set('the a an of to in for and or is are be as on at by with from this that it its into your you their they we our his her which what when who how why do does can may not no all any per each also more most such other than then them these those over under out off up down between within only if but into'.split(' '));
const tokenize=s=>s.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
async function ensureLocalKB(){
  if(KB!==undefined)return KB;
  try{const r=await fetch('content/lt-knowledge.json',{cache:'force-cache'});KB=r.ok?await r.json():null;}
  catch(e){KB=null;}
  return KB;
}
function localRetrieve(query,k=6){
  if(!KB||!KB.chunks)return [];
  const terms=[...new Set(tokenize(query))].filter(t=>t.length>=3&&!STOP.has(t));
  if(!terms.length)return [];
  const N=KB.chunks.length,df={},scored=[];
  const per=KB.chunks.map(c=>{
    const low=c._low||(c._low=c.t.toLowerCase());const tf={};
    for(const t of terms){let n=0,idx=0;while((idx=low.indexOf(t,idx))!==-1){n++;idx+=t.length;}if(n){tf[t]=n;df[t]=(df[t]||0)+1;}}
    return {c,tf};
  });
  const idf={};for(const t of terms)idf[t]=Math.log(1+(N-(df[t]||0)+0.5)/((df[t]||0)+0.5));
  for(const {c,tf} of per){let s=0;for(const t in tf){const f=tf[t];s+=idf[t]*(f*2.2)/(f+1.2*(0.25+0.75*(c.t.length/1600)));}if(s>0)scored.push({s,c});}
  scored.sort((a,b)=>b.s-a.s);
  return scored.slice(0,k).map(r=>({page:r.c.p,text:r.c.t}));
}
function localManualReady(){return !!(KB&&KB.chunks);}

async function callClaudeSmart(messages,system,opts={}){
  if(ragOn()){
    const r=await fetch(ragUrl(),{method:'POST',
      headers:{'Content-Type':'application/json','x-app-token':appToken()},
      body:JSON.stringify({messages,system,retrievalQuery:opts.retrievalQuery||'',rank:RANK,topic:opts.topic||null,maxTokens:opts.maxTokens||1400})});
    if(!r.ok){if(r.status===401||r.status===403)throw new Error('AUTH');
      const t=await r.text().catch(()=>'');throw new Error('Backend '+r.status+(t?': '+t.slice(0,140):''));}
    const d=await r.json();return {text:(d.answer||'').trim(),sources:d.sources||[]};
  }
  // No backend: use the bundled manual (Lieutenant) via in-browser retrieval.
  let sys=system,sources=[];
  if(opts.retrievalQuery&&RANK==='Lieutenant'){
    await ensureLocalKB();
    const hits=localRetrieve(opts.retrievalQuery,6);
    if(hits.length){
      sys=system+'\n\nRETRIEVED PASSAGES FROM THE LIEUTENANT MANUAL (answer from these; cite as [1], [2], …; if they do not cover the question, say so):\n\n'+
        hits.map((h,i)=>`[[${i+1}]] (manual p.${h.page})\n${h.text}`).join('\n\n---\n\n');
      sources=hits.map(h=>({title:`LT Manual — p.${h.page}`}));
    }
  }
  const text=await callClaude(messages,sys,opts.maxTokens);return {text,sources};
}
async function callClaude(messages,system,maxTokens){
  const key=aiKey();
  const headers={'Content-Type':'application/json'};
  if(key){headers['x-api-key']=key;headers['anthropic-version']='2023-06-01';headers['anthropic-dangerous-direct-browser-access']='true';}
  const body={model:aiModel(),max_tokens:maxTokens||1200,messages};
  if(system)body.system=system;
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify(body)});
  if(!r.ok){
    const t=await r.text().catch(()=>'');
    if(r.status===401||r.status===403)throw new Error('AUTH');
    throw new Error('API '+r.status+(t?': '+t.slice(0,160):''));
  }
  const data=await r.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

}

/* ---------- dashboard chart builders ---------- */
function lineChartSVG(series){
  if(!series.length)return '<div class="empty">No data yet — answer a few questions and your readiness trend appears here.</div>';
  const VBW=720,VBH=210,pL=34,pR=14,pT=14,pB=26,n=series.length;
  const x=i=>pL+(n===1?(VBW-pL-pR)/2:i/(n-1)*(VBW-pL-pR));
  const y=v=>pT+(1-v)*(VBH-pT-pB);
  const gy=[0,.25,.5,.75,1].map(v=>`<line x1="${pL}" y1="${y(v).toFixed(1)}" x2="${VBW-pR}" y2="${y(v).toFixed(1)}" stroke="#1c2431"/><text x="${pL-6}" y="${(y(v)+3).toFixed(1)}" text-anchor="end" fill="#93A0B4" font-size="10" font-family="JetBrains Mono">${v*100}</text>`).join('');
  const line=series.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.r).toFixed(1)}`).join(' ');
  const area=`M${x(0).toFixed(1)} ${y(0).toFixed(1)} `+series.map((p,i)=>`L${x(i).toFixed(1)} ${y(p.r).toFixed(1)}`).join(' ')+` L${x(n-1).toFixed(1)} ${y(0).toFixed(1)} Z`;
  const dots=series.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.r).toFixed(1)}" r="${i===n-1?4:2.2}" fill="${i===n-1?'var(--red)':'var(--amber)'}"/>`).join('');
  return `<svg viewBox="0 0 ${VBW} ${VBH}" style="width:100%;height:auto">
    <defs><linearGradient id="rgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F5A623" stop-opacity="0.26"/><stop offset="1" stop-color="#F5A623" stop-opacity="0"/></linearGradient></defs>
    ${gy}<path d="${area}" fill="url(#rgrad)"/><path d="${line}" fill="none" stroke="var(--amber)" stroke-width="2"/>${dots}
    <text x="${pL}" y="${VBH-7}" fill="#5D6B7E" font-size="10" font-family="JetBrains Mono">${series[0].d.slice(5)}</text>
    <text x="${VBW-pR}" y="${VBH-7}" text-anchor="end" fill="#5D6B7E" font-size="10" font-family="JetBrains Mono">${series[n-1].d.slice(5)}</text></svg>`;
}
function activityBarsSVG(series){
  const VBW=720,VBH=170,pL=26,pR=10,pT=12,pB=24,n=series.length;
  const max=Math.max(1,...series.map(s=>s.v)),gap=(VBW-pL-pR)/n,bw=gap*0.6;
  const y=v=>pT+(1-v/max)*(VBH-pT-pB);
  const bars=series.map((s,i)=>{const bx=pL+i*gap+(gap-bw)/2,by=y(s.v),h=Math.max(0,(VBH-pB)-by);
    return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${s.v?'var(--cyan)':'#1c2431'}"/>`+
      (i%2===1?`<text x="${(bx+bw/2).toFixed(1)}" y="${VBH-7}" text-anchor="middle" fill="#5D6B7E" font-size="9" font-family="JetBrains Mono">${s.d.slice(5)}</text>`:'');}).join('');
  const gy=`<text x="${pL-6}" y="15" text-anchor="end" fill="#93A0B4" font-size="9" font-family="JetBrains Mono">${max}</text><text x="${pL-6}" y="${VBH-pB+3}" text-anchor="end" fill="#93A0B4" font-size="9" font-family="JetBrains Mono">0</text>`;
  return `<svg viewBox="0 0 ${VBW} ${VBH}" style="width:100%;height:auto">${gy}${bars}</svg>`;
}
function masteryHeatmap(){

function buildSchedule(plan){
  const start=new Date();start.setHours(0,0,0,0);
  const end=plan.examDate?new Date(plan.examDate+'T00:00:00'):new Date(Date.now()+42*864e5);
  const mods=styleModalities();
  const order=(plan.priorities&&plan.priorities.length?plan.priorities:[]).concat(TOPICS.map(t=>t.id).filter(id=>!(plan.priorities||[]).includes(id)));
  const sessions=[];let ti=0,mi=0,d=new Date(start),guard=0;
  while(d<=end&&guard<400){guard++;
    const dn=IXDAY[d.getDay()];const mins=plan.avail[dn]||0;
    if(mins>0){sessions.push({date:new Date(d),dayName:dn,minutes:mins,topic:order[ti%order.length],modality:mods[mi%mods.length],
      timeLabel:d.toLocaleDateString('en-US',{month:'short',day:'numeric'})});ti++;mi++;}
    d.setDate(d.getDate()+1);
  }
  return sessions;
}
function planSessionsForDate(plan,date){
  if(!plan)return [];const all=buildSchedule(plan);const k=date.toISOString().slice(0,10);
  return all.filter(s=>s.date.toISOString().slice(0,10)===k);
}
function renderPlanOut(box,plan){
  const s=buildSchedule(plan);
  if(!s.length){box.innerHTML='<div class="empty">No available minutes set — add time to at least one day.</div>';return;}
  const totalMin=s.reduce((a,x)=>a+x.minutes,0);
  const byWeek={};s.forEach(x=>{const wk=Math.floor((x.date-s[0].date)/(7*864e5));(byWeek[wk]=byWeek[wk]||[]).push(x);});
  box.innerHTML=`<div class="section__title"><h3>Your schedule</h3><span class="rule"></span><span class="tag">${s.length} sessions · ${Math.round(totalMin/60)} h${plan.examDate?' · exam '+plan.examDate:''}</span></div>
    ${Object.keys(byWeek).map(wk=>`<div class="panel" style="margin-bottom:12px"><div class="eyebrow" style="margin-bottom:8px">Week ${+wk+1}</div>
      ${byWeek[wk].slice(0,7).map(x=>sessionRow({...x,timeLabel:x.timeLabel})).join('')}</div>`).join('')}`;
}

/* ---------- Practice test / Daily quiz (shared engine) ---------- */
function pickQuestions(n,rank,topicFilter){
  let pool=QUESTIONS.filter(q=>(!rank||q.rank.includes(rank))&&(!topicFilter||topicFilter==='all'||q.topic===topicFilter));
  if(pool.length<n)pool=QUESTIONS.filter(q=>!rank||q.rank.includes(rank));
  if(pool.length<n)pool=QUESTIONS.slice();
  const a=pool.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,Math.min(n,a.length));
}
const fmtS=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
function runQuiz(el,opts){
  const qs=opts.questions||pickQuestions(opts.count,opts.rank,opts.topic);let idx=0,score=0,answered=false;const results=[];
  const timed=opts.timed;let remain=(opts.count||qs.length)*60;let timer=null;
  function header(){return `<div style="display:flex;justify-content:space-between;align-items:center"><div class="eyebrow">${opts.title} · ${opts.rank}</div>
    <div class="mono" style="color:var(--text-dim)">${idx+1} / ${qs.length}${timed?` · <span id="qtime" style="color:var(--amber)">${fmtS(remain)}</span>`:''}</div></div>
    <div class="progressbar"><i style="width:${idx/qs.length*100}%"></i></div>`;}
  function draw(){const q=qs[idx];answered=false;
    el.innerHTML=`<div class="view qwrap"><div class="page-head"><h2>${opts.title}</h2></div>
      <div class="qcard">${header()}<span class="pill pill--dim">${topicShort(q.topic)}</span>
        <div class="qtext">${esc(q.q)}</div><div id="choices">${q.choices.map((c,i)=>`<div class="choice" data-i="${i}"><span class="mk">${'ABCD'[i]}</span><span>${esc(c)}</span></div>`).join('')}</div>
        <div id="exp"></div></div>
      <div class="btnrow" style="justify-content:flex-end"><button class="btn btn--red" id="qnext" disabled>${idx===qs.length-1?'Finish':'Next ›'}</button></div></div>`;
    if(timed)$('#qtime',el)&&startTimer();
    $$('.choice',el).forEach(ch=>ch.onclick=()=>{if(answered)return;answered=true;const pick=+ch.dataset.i;const correct=pick===q.answer;
      if(correct)score++;results.push({q,pick,correct});recordAnswer(q.topic,correct);
      $$('.choice',el).forEach((c,i)=>{if(i===q.answer)c.classList.add('correct');if(i===pick&&!correct)c.classList.add('wrong');c.style.pointerEvents='none';});
      $('#exp',el).innerHTML=`<div class="explain"><b style="color:${correct?'var(--green)':'#ff6b70'}">${correct?'Correct.':'Not quite.'}</b> ${esc(q.explain)}</div>`;
      $('#qnext',el).disabled=false;});
    $('#qnext',el).onclick=()=>{if(idx===qs.length-1){finish();}else{idx++;draw();}};
  }
  function startTimer(){clearInterval(timer);timer=setInterval(()=>{remain--;const t=$('#qtime',el);if(t)t.textContent=fmtS(remain);if(remain<=0){clearInterval(timer);finish();}},1000);}
  function finish(){clearInterval(timer);if(opts.markDay)markQuizDay();
    const pct=Math.round(score/qs.length*100);const pass=pct>=70;
    el.innerHTML=`<div class="view qwrap"><div class="page-head"><h2>${opts.title} — Results</h2></div>
      <div class="panel" style="text-align:center;padding:26px"><div style="display:flex;justify-content:center;margin-bottom:6px">${ringSVG(score/qs.length,'SCORE',150)}</div>

/* ---------- Study Assistant (AI, grounded in the user's material) ---------- */
function viewAssistant(el){
  const chat=Store.get('chatLog',[]);
  el.innerHTML=`<div class="view"><div class="page-head"><h2>Study Assistant</h2>
    <p>Ask a question and get an answer grounded in your registered material and study notes — plus practice questions, plain-English explanations, or a fresh scenario on request.</p></div>
    <div class="notice notice--ai"><span>✦</span><div>${ragOn()?'<b>Manuals backend connected.</b> Answers are retrieved from your ingested reference manuals and cite the source passages.':(RANK==='Lieutenant'?'This prototype bundles the <b>Lieutenant manual</b>: the assistant searches it and answers with page citations. Only the LT manual is loaded — other ranks fall back to general study notes.':'Only the <b>Lieutenant manual</b> is loaded in this prototype. Switch the rank to <b>Lieutenant</b> for manual-cited answers.')} It can be wrong — always confirm against the source publication.</div></div>
    <div class="btnrow" style="margin-bottom:12px">
      <button class="btn btn--ghost" data-quick="Explain flashover to me like I'm new to the fire service.">Explain simply</button>
      <button class="btn btn--ghost" data-quick="Write me 3 practice questions on incident command for the ${RANK} exam, with answers.">Make practice Qs</button>
      <button class="btn btn--ghost" data-quick="Give me a realistic FDNY decision-making scenario for a ${RANK} and what graders would look for.">New scenario</button>
      <button class="btn btn--ghost" id="chatClear" style="margin-left:auto">Clear chat</button>
    </div>
    <div class="chat"><div class="chat__log" id="chatLog"></div>
      <div class="chat__form"><textarea id="chatIn" placeholder="Ask about any topic in your material…"></textarea>
        <button class="btn btn--violet" id="chatSend">Send</button></div></div></div>`;
  const log=$('#chatLog',el);
  function render(){
    log.innerHTML=(chat.length?chat:[{role:'ai',text:'Ask me anything about your study material. For example: “What are the priorities for a first-due engine at a private dwelling fire?”'}])
      .map(m=>`<div class="msg ${m.role==='me'?'me':'ai'}"><div class="msg__av">${m.role==='me'?'YOU':'AI'}</div><div class="msg__body">${esc(m.text)}${m.src?`<div class="src">${esc(m.src)}</div>`:''}</div></div>`).join('');
    log.scrollTop=log.scrollHeight;
  }
  render();
  async function send(text){
    if(!text.trim())return;
    chat.push({role:'me',text});Store.set('chatLog',chat);render();
    log.insertAdjacentHTML('beforeend',`<div class="msg ai" id="pending"><div class="msg__av">AI</div><div class="msg__body"><span class="typing"><i></i><i></i><i></i></span></div></div>`);
    log.scrollTop=log.scrollHeight;
    const sys=`You are a study assistant for FDNY officers preparing for the ${RANK} promotion exam. Answer ONLY from the knowledge context and any retrieved source passages provided; if it isn't covered there, say so and suggest which publication to check. Be concise, accurate, and exam-focused. When asked, produce practice questions with clearly marked answers, plain-English explanations, or realistic decision-making scenarios with grader key-points. Never invent official FDNY procedure you can't support from the context.\n\nKNOWLEDGE CONTEXT:\n${knowledgeContext()}`;
    const history=chat.slice(-8).map(m=>({role:m.role==='me'?'user':'assistant',content:m.text}));
    try{
      const res=await callClaudeSmart(history,sys,{retrievalQuery:text,maxTokens:1400});
      $('#pending',el)&&$('#pending',el).remove();
      const src=res.sources&&res.sources.length
        ?'Sources: '+res.sources.map(s=>s.title||s).join('; ')
        :(ragOn()?'No matching passages found in the ingested manuals — answer may be limited.'
          :(RANK==='Lieutenant'&&localManualReady()?'No matching passage found in the LT manual for this — answer may be limited; verify against the source.'
            :'Grounded in general study notes. Verify against the source publication.'));
      chat.push({role:'ai',text:res.text||'(no response)',src});
      Store.set('chatLog',chat);render();
    }catch(err){
      $('#pending',el)&&$('#pending',el).remove();
      const msg=err.message==='AUTH'
        ?(ragOn()?'The backend rejected the request (check the App token in Settings matches your APP_TOKEN).':'I need an Anthropic API key to answer here. Open Settings (gear, top-right) and paste your key — it stays in your browser. Inside the Claude preview it works without one.')
        :'I couldn\'t reach the AI service just now ('+esc(err.message)+'). Check your backend URL / key in Settings.';
      chat.push({role:'ai',text:msg});Store.set('chatLog',chat);render();
    }
  }
  $('#chatSend',el).onclick=()=>{const v=$('#chatIn',el).value;$('#chatIn',el).value='';send(v);};
  $('#chatIn',el).addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('#chatSend',el).click();}});
  $$('[data-quick]',el).forEach(b=>b.onclick=()=>send(b.dataset.quick));
  $('#chatClear',el).onclick=()=>{chat.length=0;Store.set('chatLog',chat);render();};
}

async function buildEpisodeAI(topics,source,rank,minutes,style){
  const wordTarget=minutes*130; // ~130 spoken wpm
  const styleInstr={simple:'Explain complex ideas in plain, everyday language a new firefighter would understand. Use analogies.',
    exam:'Focus tightly on what is testable on the promotion exam. Emphasize definitions, sequences, and decision points.',
    story:'Frame the material through realistic fireground scenarios, drawing out the lesson each time.'}[style];
  const topicNotes=topics.map(t=>`${topicLabel(t)}:\n`+(TOPIC_NOTES[t]||[]).join('\n')).join('\n\n');
  const sys=`You are scripting a single-host audio study episode for FDNY ${rank} exam candidates. Write natural spoken narration (no stage directions, no "host:" labels). Target about ${wordTarget} words for a ${minutes}-minute episode. ${styleInstr} Open with a short welcome, cover the material in a logical order with clear verbal transitions, insert brief "quick check" questions the listener can answer in their head, and close with a recap and encouragement. Output ONLY the narration as plain paragraphs separated by blank lines. Mark each major segment with a line beginning "— " followed by the segment title.`;
  const user=(source?`PRIMARY SOURCE TEXT (script the episode chiefly from this, in plain English):\n${source.slice(0,12000)}\n\n`:'')+
    (topicNotes?`SUPPORTING STUDY NOTES:\n${topicNotes}\n\n`:'')+
    `Write the ${minutes}-minute episode now.`;
  const retrievalQuery=source?source.slice(0,400):`${topics.map(topicLabel).join(', ')} — key exam points for ${rank}`;
  const res=await callClaudeSmart([{role:'user',content:user}],sys,{retrievalQuery,topic:topics[0]||null,maxTokens:Math.min(8000,Math.round(wordTarget*1.8))});
  const paras=(res.text||'').split(/\n{2,}/).map(s=>s.trim()).filter(Boolean);
  return paras.length?paras:buildEpisodeLocal(topics,rank,minutes);
}
function buildEpisodeLocal(topics,rank,minutes){
  const per=minutes<=5?2:minutes<=15?3:5;const list=topics.length?topics:['command'];
  const out=[`Welcome to your F D N Y promotion prep episode, tailored for the rank of ${rank}. Today we're covering ${list.map(topicLabel).join(', ')}. Let's get into it.`];
  list.forEach(t=>{out.push(`— ${topicLabel(t)}`);
    (TOPIC_NOTES[t]||[]).slice(0,per).forEach(n=>out.push(n));
    out.push(`Quick check as you listen: how would that apply on your next tour as a ${rank}?`);});
  out.push(`That wraps this episode. Review the flashcards on these topics, then take a short quiz to lock it in. Stay safe, and good luck on the exam.`);
  return out;
}
function preparePod(paras,el){
  if(!window.speechSynthesis){return;}
  speechSynthesis.cancel();POD={utters:[],idx:0,playing:false};
  const rate=+$('#podRate',el).value||1;const vi=+($('#podVoice',el).value||0);const vs=speechSynthesis.getVoices();
  paras.forEach((p,i)=>{const clean=p.replace(/^—\s*/,'');const u=new SpeechSynthesisUtterance(clean);u.rate=rate;if(vs[vi])u.voice=vs[vi];
    u.onstart=()=>{$$('#podScript p',el).forEach(x=>x.classList.remove('now'));const cur=$(`#podScript p[data-p="${i}"]`,el);if(cur){cur.classList.add('now');cur.scrollIntoView({block:'nearest'});}};
    u.onend=()=>{if(i===paras.length-1){POD.playing=false;$('#podPlay',el).textContent='▶ Play';$$('#podScript p',el).forEach(x=>x.classList.remove('now'));}};
    POD.utters.push(u);});
  const play=$('#podPlay',el),stop=$('#podStop',el);
  play.onclick=()=>{if(POD.playing){speechSynthesis.pause();POD.playing=false;play.textContent='▶ Resume';}
    else{if(speechSynthesis.paused){speechSynthesis.resume();}else{POD.utters.forEach(u=>speechSynthesis.speak(u));}POD.playing=true;play.textContent='⏸ Pause';}};
  stop.onclick=()=>{speechSynthesis.cancel();POD.playing=false;play.textContent='▶ Play';$$('#podScript p',el).forEach(x=>x.classList.remove('now'));};
  $('#podRate',el).onchange=()=>preparePod(paras,el);$('#podVoice',el).onchange=()=>preparePod(paras,el);
}

      <div style="font-size:12px;color:var(--text-dim);margin-top:6px">${esc(v.title||'')} · ${topicLabel(v.topic||'')}</div></div>`).join(''); } });
}
function diagICS(){return `<svg viewBox="0 0 640 220" style="width:100%;height:auto">
  ${icsBox(260,10,120,'Incident Cmd','var(--red)')}
  <line x1="320" y1="52" x2="320" y2="78" stroke="#33404F"/>
  <line x1="140" y1="78" x2="500" y2="78" stroke="#33404F"/>
  ${['Ops','Planning','Logistics'].map((t,i)=>{const x=90+i*190;return `<line x1="${x+60}" y1="78" x2="${x+60}" y2="96" stroke="#33404F"/>`+icsBox(x,96,120,t,'var(--amber)');}).join('')}
  <line x1="150" y1="138" x2="150" y2="158" stroke="#33404F"/>
  ${['Div A','Div B','Search Grp'].map((t,i)=>icsBox(40+i*100,158,90,t,'var(--cyan)')).join('')}
</svg>`;}
function icsBox(x,y,w,t,c){return `<g><rect x="${x}" y="${y}" width="${w}" height="34" rx="6" fill="var(--bg-elev-2)" stroke="${c}"/><text x="${x+w/2}" y="${y+22}" text-anchor="middle" fill="var(--text)" font-family="Oswald" font-size="13" letter-spacing="1">${t}</text></g>`;}
function diagRECEO(){const items=[['R','Rescue'],['E','Exposures'],['C','Confinement'],['E','Extinguish'],['O','Overhaul'],['V','Vent'],['S','Salvage']];
  return `<svg viewBox="0 0 700 90" style="width:100%;height:auto" id="receoSvg">${items.map((it,i)=>{const x=8+i*98;
    return `<g class="receo-step" data-s="${i}" opacity="0.35"><rect x="${x}" y="20" width="86" height="50" rx="8" fill="var(--bg-elev-2)" stroke="var(--red)"/>
      <text x="${x+43}" y="45" text-anchor="middle" fill="var(--red)" font-family="Oswald" font-weight="700" font-size="20">${it[0]}</text>
      <text x="${x+43}" y="62" text-anchor="middle" fill="var(--text-dim)" font-family="Inter" font-size="10">${it[1]}</text></g>`;}).join('')}</svg>`;}
function animRECEO(el){const steps=$$('#receoSvg .receo-step',el);if(!steps.length)return;let i=0;
  const t=setInterval(()=>{steps.forEach((s,j)=>s.setAttribute('opacity',j<=i?'1':'0.35'));i++;if(i>steps.length){i=0;}},550);
  el._receoTimer&&clearInterval(el._receoTimer);el._receoTimer=t;}
function diagFireCurve(){return `<svg viewBox="0 0 640 240" style="width:100%;height:auto" id="fireSvg">
  <line x1="40" y1="200" x2="620" y2="200" stroke="#33404F"/><line x1="40" y1="20" x2="40" y2="200" stroke="#33404F"/>
  <text x="330" y="228" text-anchor="middle" fill="#5D6B7E" font-size="11" font-family="Inter">Time →</text>
  <text x="16" y="110" fill="#5D6B7E" font-size="11" font-family="Inter" transform="rotate(-90 16 110)">Temperature →</text>
  <path id="fireCurve" d="M40 195 C 160 190, 220 150, 300 70 C 340 35, 380 40, 460 55 C 540 68, 590 150, 610 195" fill="none" stroke="var(--amber)" stroke-width="2.5"/>
  <line x1="300" y1="20" x2="300" y2="200" stroke="var(--red)" stroke-dasharray="4 4"/>
  <text x="306" y="34" fill="var(--red)" font-size="11" font-family="Oswald" letter-spacing="1">FLASHOVER</text>
  <text x="120" y="185" fill="#5D6B7E" font-size="10">Growth</text><text x="380" y="40" fill="#5D6B7E" font-size="10">Fully developed</text><text x="560" y="185" fill="#5D6B7E" font-size="10">Decay</text>
  <circle id="fireDot" r="5" fill="var(--red)"><animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/></circle>
</svg>`;}
function animFireCurve(el){const path=$('#fireCurve',el),dot=$('#fireDot',el);if(!path||!dot)return;const len=path.getTotalLength();let t=0;
  const iv=setInterval(()=>{t=(t+0.006)%1;const pt=path.getPointAtLength(t*len);dot.setAttribute('cx',pt.x);dot.setAttribute('cy',pt.y);},30);
  el._fireTimer&&clearInterval(el._fireTimer);el._fireTimer=iv;}

/* ---------- Acronyms & Mnemonics (built-in + custom builder) ---------- */
function viewAcronyms(el){
  el.innerHTML=`<div class="view"><div class="page-head"><h2>Acronyms & Mnemonics</h2>
    <p>Memory hooks for complex, high-pressure sequences — plus a builder for your own. Search built-ins, then create and save custom mnemonics to the right chapter so they show up whenever you study that topic.</p></div>

    <div class="panel" style="margin-bottom:20px"><div class="section__title" style="margin-top:0"><h3>Build your own</h3><span class="rule"></span><span class="tag">saved to this device</span></div>
      <div class="grid g2" style="grid-template-columns:1fr 1fr">
        <div>
          <label class="fld"><span class="k">Acronym / phrase</span><input id="mnAcr" placeholder="e.g. WALLACE WAS HOT"></label>
          <label class="fld"><span class="k">Save to chapter / topic</span><select id="mnTopic">${TOPICS.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}</select></label>
          <label class="fld"><span class="k">When to use it</span><input id="mnUse" placeholder="e.g. Size-up checklist I actually remember"></label>
        </div>
        <div>
          <label class="fld"><span class="k">Expansion — one line per letter/word</span>
            <textarea id="mnExp" style="min-height:150px" placeholder="W = Water supply&#10;A = Area&#10;L = Life hazard&#10;..."></textarea></label>
          <div class="btnrow"><button class="btn btn--red" id="mnSave">Save mnemonic</button><span id="mnMsg" style="color:var(--green);font-size:12px"></span></div>
        </div>
      </div>
    </div>

    <div class="btnrow" style="margin-bottom:14px"><input id="acrSearch" placeholder="Search acronyms…" style="max-width:320px"><select id="acrFilter" style="max-width:220px"><option value="all">All topics</option>${TOPICS.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}</select></div>
    <div id="mineWrap"></div>
    <div class="section__title"><h3>Built-in library</h3><span class="rule"></span></div>
    <div class="grid g2" id="acrList"></div></div>`;

  function drawMine(){
    const mine=customMnemonics();
    const box=$('#mineWrap',el);
    if(!mine.length){box.innerHTML='';return;}
    box.innerHTML=`<div class="section__title"><h3>Your mnemonics</h3><span class="rule"></span><span class="tag">${mine.length}</span></div>
      <div class="grid g2" style="margin-bottom:20px">${mine.map(m=>`<div class="acr"><h4>${esc(m.acr)}</h4>
        <span class="pill pill--violet">${topicShort(m.topic)}</span>
        <div class="exp">${m.exp.map(e=>`<span><b>${esc(e[0])}</b> ${esc(e[1])}</span>`).join('')}</div>
        <div class="use">${esc(m.use||'')}</div>
        <div class="owner"><button class="btn btn--ghost" data-del="${m.id}" style="padding:5px 11px">Delete</button></div></div>`).join('')}</div>`;
    $$('[data-del]',box).forEach(b=>b.onclick=()=>{deleteMnemonic(b.dataset.del);drawMine();});
  }
  function drawBuiltin(){
    const q=($('#acrSearch',el).value||'').toLowerCase();const tf=$('#acrFilter',el).value;
    const items=ACRONYMS.filter(a=>(tf==='all'||a.topic===tf)&&(!q||a.acr.toLowerCase().includes(q)||a.use.toLowerCase().includes(q)||topicLabel(a.topic).toLowerCase().includes(q)));
    $('#acrList',el).innerHTML=items.map(a=>`<div class="acr"><h4>${a.acr}</h4>
      <span class="pill pill--dim">${topicShort(a.topic)}</span>
      <div class="exp">${a.exp.map(e=>`<span><b>${e[0]}</b> ${e[1]}</span>`).join('')}</div>
      <div class="use">${a.use}</div></div>`).join('')||'<div class="empty">No matches.</div>';
  }
  $('#mnSave',el).onclick=()=>{
    const acr=$('#mnAcr',el).value.trim();const raw=$('#mnExp',el).value.trim();
    if(!acr||!raw){$('#mnMsg',el).textContent='Add an acronym and at least one expansion line.';$('#mnMsg',el).style.color='#ff6b70';return;}
    const exp=raw.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{const m=l.split(/\s*[=\-–:]\s*/);return m.length>1?[m[0],m.slice(1).join(' ')]:[l.charAt(0),l];});
    saveMnemonic({id:uid(),acr,topic:$('#mnTopic',el).value,use:$('#mnUse',el).value.trim(),exp});
    $('#mnAcr',el).value='';$('#mnExp',el).value='';$('#mnUse',el).value='';
    $('#mnMsg',el).style.color='var(--green)';$('#mnMsg',el).textContent='Saved.';drawMine();
  };
  $('#acrSearch',el).oninput=drawBuiltin;$('#acrFilter',el).onchange=drawBuiltin;
  drawMine();drawBuiltin();
}

/* ---------- boot ---------- */
$('#settingsBtn').onclick=openSettings;
renderRank();renderNav();if(!location.hash)location.hash='#dashboard';
loadManifest().then(()=>route());
route();
</script>
